version: 1
type: view
name: customers
description: >-
  This view provides a comprehensive overview of customer data for Pure
  Organics, including details such as the customer's ID, email address, name,
  address, and location. The `accepts_marketing` field indicates whether the
  customer has opted in to marketing communications, while the `first_order`
  field provides the date and time of the customer's first order. Additionally,
  the `first_marketing_group`, `first_promotion`, and `first_campaign` fields
  provide information about the customer's initial marketing interactions with
  the company. Use this view to gain insights into customer behavior, track
  customer acquisition and retention, and optimize your marketing campaigns to
  drive revenue and growth
model_name: pure_organics
sql_table_name: DEMO_PROD.CUSTOMERS
default_date: cohort_date
row_label: Customer
identifiers:
- name: customer_id
  type: primary
  sql: ${customer_id}
- name: orders_join
  type: join
  reference: order_lines
  relationship: one_to_many
  join_type: left_outer
  sql_on: ${order_lines.customer_id} = ${customers.customer_id}
fields:
- name: customer_id
  field_type: dimension
  type: string
  hidden: false
  primary_key: true
  description: The id of the customer.
  sql: ${TABLE}.CUSTOMER_ID
  searchable: false

- name: accepts_marketing
  field_type: dimension
  type: yesno
  description: 'Whether the customer accepts marketing. '
  sql: ${TABLE}.ACCEPTS_MARKETING

- name: email
  field_type: dimension
  type: string
  description: The customer's email address
  required_access_grants:
  - pii_access
  sql: ${TABLE}.EMAIL
  searchable: false

- name: first_name
  field_type: dimension
  type: string
  sql: ${TABLE}.FIRST_NAME
  searchable: false

- name: last_name
  field_type: dimension
  type: string
  sql: ${TABLE}.LAST_NAME
  searchable: false

- name: full_name
  field_type: dimension
  type: string
  sql: concat(${first_name}, ${last_name})
  searchable: false

- name: address
  field_type: dimension
  type: string
  description: The customer's address (shipping)
  sql: ${TABLE}.ADDRESS
  searchable: false

- name: city
  field_type: dimension
  type: string
  description: The customer's city (location)
  sql: ${TABLE}.CITY
  searchable: false

- name: state
  field_type: dimension
  type: string
  description: The customer's state (location)
  sql: ${TABLE}.STATE
  searchable: true

- name: zipcode
  field_type: dimension
  type: string
  description: The customer's zip code
  sql: ${TABLE}.ZIPCODE
  searchable: false

- name: first_marketing_group
  field_type: dimension
  type: string
  description: The first marketing group the user came in through
  sql: ${TABLE}.first_channel
  searchable: false

- name: first_promotion
  field_type: dimension
  type: string
  description: The first promotion the user came in through
  sql: ${TABLE}.first_promotion
  searchable: false

- name: first_campaign
  field_type: dimension
  type: string
  description: The first campaign the user came in through
  sql: ${TABLE}.first_campaign
  searchable: false

- name: cohort_date
  field_type: dimension_group
  type: time
  datatype: timestamp
  description: The time at which the customer's first order was placed.
  timeframes:
  - date
  sql: ${TABLE}.first_order_at

- name: cohort_week
  field_type: dimension
  type: string
  hidden: false
  label: First Order Week
  description: The week of the customer's first order.
  sql: TO_CHAR(DATE_TRUNC('week', ${TABLE}.first_order_at), 'YYYY-MM-DD')
  searchable: false

- name: cohort_month
  field_type: dimension
  type: string
  hidden: false
  label: First Order Month
  description: The month of the customer's first order.
  sql: TO_CHAR(DATE_TRUNC('month', ${TABLE}.first_order_at), 'YYYY-MM')
  searchable: false

- name: cohort_quarter
  field_type: dimension
  type: string
  hidden: false
  label: First Order Quarter
  description: The quarter of the customer's first order.
  sql: TO_CHAR(DATE_TRUNC('quarter', ${TABLE}.first_order_at), 'YYYY-MM')
  searchable: false

- name: cohort_year
  field_type: dimension
  type: number
  hidden: false
  label: First Order Year
  description: The year of the customer's first order.
  sql: YEAR(${TABLE}.first_order_at)
  searchable: false

- name: count_customers
  field_type: measure
  type: count_distinct
  value_format_name: decimal_0
  sql: ${customer_id}

- name: count_unique_customer_ids
  field_type: measure
  type: count_distinct
  label: Unique Customer IDs
  description: The number of unique customer IDs in the customers table.
  value_format_name: decimal_0
  sql: ${customer_id}

- name: count_emails
  field_type: measure
  type: count_distinct
  value_format_name: decimal_0
  sql: ${email}
