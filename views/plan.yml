version: 1
type: view
name: plan
model_name: pure_organics
sql_table_name: '"PEOPLE_PULSE_RAW"."PLAN"'
fields:
- name: sales_rep_id
  sql: ${TABLE}."SALES_REP_ID"
  field_type: dimension
  type: number
- name: daily_quota
  sql: ${TABLE}."DAILY_QUOTA"
  field_type: dimension
  type: number
- name: date
  sql: ${TABLE}."DATE"
  field_type: dimension_group
  type: time
  timeframes:
  - raw
  - date
  - day_of_year
  - week
  - week_of_year
  - month
  - month_of_year
  - quarter
  - year
  datatype: timestamp
default_date: date
