version: 1
type: view
name: customers_orders
description: >-
  Duplicate view of the customers table used to emulate a multi-view
  ambiguity error. This view references the same underlying table as the
  'customers' view ("DEMO_PROD"."CUSTOMERS"), which will cause Zoe to raise
  an UnknownTableError when a query joins to that table and both views are
  candidates. This mirrors the com_fin_orders_w_party_org_d /
  com_fin_prof_w_party_org_d duplicate-view scenario from the commercial
  finance profitability environment.
model_name: pure_organics
sql_table_name: '"DEMO_PROD"."CUSTOMERS"'
default_date: first_order
row_label: Customer (Orders)

fields:
- name: customer_id
  field_type: dimension
  type: string
  hidden: false
  primary_key: true
  description: The id of the customer.
  sql: ${TABLE}."CUSTOMER_ID"
  searchable: false

- name: full_name
  field_type: dimension
  type: string
  description: The customer's full name.
  sql: concat(${TABLE}."FIRST_NAME", ${TABLE}."LAST_NAME")
  searchable: false

- name: state
  field_type: dimension
  type: string
  description: The customer's state (location)
  sql: ${TABLE}."STATE"
  searchable: true

- name: first_order
  field_type: dimension_group
  type: time
  datatype: timestamp
  description: The time at which the customer's first order was placed.
  timeframes:
  - raw
  - date
  - week
  - month
  - quarter
  - year
  sql: ${TABLE}."FIRST_ORDER_AT"

- name: count_customers
  field_type: measure
  type: count_distinct
  value_format_name: decimal_0
  sql: ${customer_id}
