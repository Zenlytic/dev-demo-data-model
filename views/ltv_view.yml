version: 1
type: view
name: ltv
model_name: pure_organics
label: Customer LTV
description: >-
  Customer lifetime value data at a customer-month grain. Each row represents
  one customer's activity in a given month, including orders placed, cumulative
  order history, and gross sales. Use this table to analyze cohort LTV trends
  and customer purchasing behavior over time.
sql_table_name: DEMO.DEMO_PROD.LTV
default_date: date_month

fields:
  - name: customer_id
    field_type: dimension
    type: number
    sql: ${TABLE}.CUSTOMER_ID
    label: Customer ID
    description: Unique identifier for the customer.
    primary_key: true
    searchable: false

  - name: date_month
    field_type: dimension_group
    type: time
    datatype: date
    timeframes:
      - raw
      - date
      - week
      - month
      - quarter
      - year
    sql: ${TABLE}.DATE_MONTH
    label: Date Month
    description: The calendar month for this row of customer activity.

  - name: n_customers_in_month
    field_type: dimension
    type: number
    sql: ${TABLE}.N_CUSTOMERS_IN_MONTH
    label: Active in Month
    description: >-
      1 if the customer was active (placed at least one order) in this month,
      0 otherwise.
    searchable: false

  - name: n_orders_in_month
    field_type: dimension
    type: number
    sql: ${TABLE}.N_ORDERS_IN_MONTH
    label: Orders in Month
    description: Number of orders placed by this customer in this month.
    searchable: false

  - name: n_cumulative_orders
    field_type: dimension
    type: number
    sql: ${TABLE}.N_CUMULATIVE_ORDERS
    label: Cumulative Orders
    description: Running total of orders placed by this customer up to and including this month.
    searchable: false

  - name: gross_sales
    field_type: dimension
    type: number
    sql: ${TABLE}.GROSS_SALES
    label: Gross Sales
    description: Gross sales revenue attributed to this customer in this month.
    searchable: false

  - name: total_gross_sales
    field_type: measure
    type: sum
    sql: ${TABLE}.GROSS_SALES
    label: Total Gross Sales
    description: Sum of gross sales across all customers and months.
    value_format_name: usd

  - name: total_orders
    field_type: measure
    type: sum
    sql: ${TABLE}.N_ORDERS_IN_MONTH
    label: Total Orders
    description: Total number of orders placed across all customers and months.

  - name: total_active_customers
    field_type: measure
    type: sum
    sql: ${TABLE}.N_CUSTOMERS_IN_MONTH
    label: Total Active Customers
    description: Total count of active customer-months (customers active in a given month).

  - name: avg_cumulative_orders
    field_type: measure
    type: average
    sql: ${TABLE}.N_CUMULATIVE_ORDERS
    label: Avg Cumulative Orders
    description: Average number of cumulative orders per customer-month row.
    value_format_name: decimal_2
