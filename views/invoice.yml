version: 1
type: view
name: invoice
model_name: pure_organics
sql_table_name: '"PEOPLE_PULSE_RAW"."INVOICE"'
fields:
- name: account_id
  sql: ${TABLE}."ACCOUNT_ID"
  field_type: dimension
  type: number
- name: invoice_date
  sql: ${TABLE}."INVOICE_DATE"
  field_type: dimension_group
  type: time
  timeframes:
  - raw
  - date
  - day_of_year
  - week
  - week_of_year
  - month
  - month_of_year
  - quarter
  - year
  datatype: timestamp
- name: cadence
  sql: ${TABLE}."CADENCE"
  field_type: dimension
  type: string
  searchable: true
- name: invoice_id
  sql: ${TABLE}."INVOICE_ID"
  field_type: dimension
  type: number
default_date: invoice_date
